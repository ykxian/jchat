services:
  postgres:
    image: postgres:16
    container_name: jchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jchat}
      POSTGRES_USER: ${DB_USER:-jchat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jchat}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: jchat-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
