spring:
  application:
    name: ${APP_NAME:jchat}
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchat}
    username: ${DB_USER:jchat}
    password: ${DB_PASSWORD:jchat}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%thread] [%X{requestId:-}] %logger{36} - %msg%n"

app:
  name: ${APP_NAME:jchat}
  description: 多用户 AI 对话应用（仿 NextChat）
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:MWYzMjU0NzY5OGFiY2RlZjAxMjM0NTY3ODlhYmNkZWYxZjMyNTQ3Njk4YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
    refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:refresh}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
  chat:
    default-provider: ${CHAT_DEFAULT_PROVIDER:openai}
  llm:
    max-connections: 200
    pending-acquire-timeout: 10s
    connect-timeout: 5s
    response-timeout: 300s
    max-in-memory-size: 10MB
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
