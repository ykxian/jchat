spring:
  application:
    name: ${APP_NAME:jchat}
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchat}
    username: ${DB_USER:jchat}
    password: ${DB_PASSWORD:jchat}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%thread] [%X{requestId:-}] %logger{36} - %msg%n"

app:
  name: ${APP_NAME:jchat}
  description: 多用户 AI 对话应用（仿 NextChat）
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  llm:
    max-connections: 200
    pending-acquire-timeout: 10s
    connect-timeout: 5s
    response-timeout: 300s
    max-in-memory-size: 10MB
