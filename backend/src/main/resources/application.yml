spring:
  application:
    name: ${APP_NAME:jchat}
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchat}
    username: ${DB_USER:jchat}
    password: ${DB_PASSWORD:jchat}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${STORAGE_MAX_UPLOAD_SIZE:50MB}
      max-request-size: ${STORAGE_MAX_UPLOAD_SIZE:50MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%thread] [%X{requestId:-}] %logger{36} - %msg%n"

app:
  name: ${APP_NAME:jchat}
  description: 多用户 AI 对话应用（仿 NextChat）
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:MWYzMjU0NzY5OGFiY2RlZjAxMjM0NTY3ODlhYmNkZWYxZjMyNTQ3Njk4YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
    refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:refresh}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
  crypto:
    key: ${APP_CRYPTO_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  chat:
    default-provider: ${CHAT_DEFAULT_PROVIDER:openai}
  files:
    root: ${STORAGE_ROOT:./data/files}
    max-upload-size: ${STORAGE_MAX_UPLOAD_SIZE:50MB}
    upload-limit-per-hour: ${FILE_UPLOAD_LIMIT_PER_HOUR:10}
    reference-token-budget: ${FILE_REFERENCE_TOKEN_BUDGET:4000}
    max-extracted-chars: ${FILE_MAX_EXTRACTED_CHARS:50000}
  llm:
    max-connections: 200
    pending-acquire-timeout: 10s
    connect-timeout: 5s
    response-timeout: 300s
    max-in-memory-size: 10MB
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      api-key: ${GEMINI_API_KEY:}
  tools:
    calculator-enabled: ${APP_TOOLS_CALCULATOR_ENABLED:true}
    weather-enabled: ${APP_TOOLS_WEATHER_ENABLED:true}
    weather-geocoding-base-url: ${APP_TOOLS_WEATHER_GEOCODING_BASE_URL:https://geocoding-api.open-meteo.com}
    weather-forecast-base-url: ${APP_TOOLS_WEATHER_FORECAST_BASE_URL:https://api.open-meteo.com}
    http-fetch-allowlist: ${APP_TOOLS_HTTP_FETCH_ALLOWLIST:}
    http-fetch-timeout-seconds: ${APP_TOOLS_HTTP_FETCH_TIMEOUT_SECONDS:10}
    http-fetch-max-bytes: ${APP_TOOLS_HTTP_FETCH_MAX_BYTES:2097152}
    web-search-enabled: ${APP_TOOLS_WEB_SEARCH_ENABLED:true}
    web-search-base-url: ${APP_TOOLS_WEB_SEARCH_BASE_URL:https://www.bing.com/search}
